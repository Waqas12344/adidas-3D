name: Deploy Adidas 3D website

on:
  workflow_dispatch:  
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the respository
      - name: Checkout code
        uses:
          actions/checkout@v3

          # Setup Node Js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

            # Install Dependencies
      - name: Install Dependencies
        run:
          npm install

          # Build the Project
      - name: Build Project
        run:
          npm run build

          # Deploy to github pages
      - name: Deploy to github pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
